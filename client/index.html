<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PredGen Voice Agent — Latency Benchmark</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: #0a0a0f;
    color: #e0e0e8;
    padding: 2rem;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
    color: #fff;
  }
  .subtitle {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .summary-bar {
    display: flex;
    gap: 2rem;
    margin-bottom: 2rem;
    padding: 1.25rem;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border: 1px solid #2a2a4a;
    border-radius: 8px;
  }
  .summary-stat {
    text-align: center;
  }
  .summary-stat .value {
    font-size: 2rem;
    font-weight: 700;
    color: #4ade80;
  }
  .summary-stat .label {
    font-size: 0.75rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .result-card {
    background: #111118;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .result-card h2 {
    font-size: 1rem;
    color: #c0c0d0;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .result-card h2 .badge {
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    background: #4ade80;
    color: #000;
    font-weight: 600;
  }
  .pipelines {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1rem;
  }
  .pipeline {
    padding: 1rem;
    border-radius: 6px;
    border: 1px solid #2a2a3a;
  }
  .pipeline.baseline { background: #1a1015; border-color: #3a2030; }
  .pipeline.predgen { background: #101a15; border-color: #203a30; }
  .pipeline h3 {
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .pipeline.baseline h3 { color: #f87171; }
  .pipeline.predgen h3 { color: #4ade80; }
  .metric-row {
    display: flex;
    justify-content: space-between;
    padding: 0.3rem 0;
    font-size: 0.8rem;
    border-bottom: 1px solid #ffffff08;
  }
  .metric-row .label { color: #888; }
  .metric-row .value { color: #e0e0e8; font-weight: 500; }
  .timeline {
    margin-top: 1rem;
  }
  .timeline-label {
    font-size: 0.7rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
  }
  .timeline-bar-container {
    position: relative;
    height: 28px;
    background: #0a0a10;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
  .timeline-segment {
    position: absolute;
    top: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 500;
    color: #fff;
    border-radius: 2px;
    min-width: 2px;
  }
  .seg-asr { background: #3b82f6; }
  .seg-llm { background: #f59e0b; }
  .seg-tts { background: #8b5cf6; }
  .transcript-box {
    margin-top: 0.75rem;
    padding: 0.5rem;
    background: #0a0a10;
    border-radius: 4px;
    font-size: 0.75rem;
    color: #a0a0b0;
    max-height: 60px;
    overflow-y: auto;
  }
  .transcript-box .label {
    color: #666;
    font-size: 0.65rem;
    text-transform: uppercase;
  }
  audio {
    width: 100%;
    height: 32px;
    margin-top: 0.5rem;
  }
  .load-section {
    text-align: center;
    padding: 3rem;
  }
  .load-section input[type="file"] {
    display: none;
  }
  .load-btn {
    padding: 0.75rem 2rem;
    background: #4ade80;
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
  .load-btn:hover { background: #22c55e; }
  .legend {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1rem;
    font-size: 0.75rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<h1>PredGen Voice Agent Benchmark</h1>
<p class="subtitle">Input-time speculative decoding for real-time speech interaction</p>

<div id="app">
  <div class="load-section">
    <p style="color: #888; margin-bottom: 1rem;">Load metrics.json from the benchmark run</p>
    <label class="load-btn">
      Load metrics.json
      <input type="file" id="fileInput" accept=".json">
    </label>
  </div>
</div>

<script>
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      renderResults(data);
    } catch (err) {
      alert('Failed to parse JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
});

function fmt(val, unit = 's') {
  if (val == null || val === undefined) return '—';
  if (typeof val === 'number') {
    if (unit === 's') return val.toFixed(3) + 's';
    if (unit === 'x') return val.toFixed(2) + 'x';
    return val.toFixed(2) + unit;
  }
  return String(val);
}

function renderResults(data) {
  const app = document.getElementById('app');

  // Summary bar
  let html = `
    <div class="summary-bar">
      <div class="summary-stat">
        <div class="value">${data.avg_speedup.toFixed(2)}x</div>
        <div class="label">Avg Speedup</div>
      </div>
      <div class="summary-stat">
        <div class="value">${data.avg_time_saved.toFixed(2)}s</div>
        <div class="label">Avg Time Saved</div>
      </div>
      <div class="summary-stat">
        <div class="value">${data.num_files}</div>
        <div class="label">Audio Files</div>
      </div>
      <div class="summary-stat">
        <div class="value" style="font-size:1rem; color: #c0c0d0;">${data.model}</div>
        <div class="label">Model</div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> ASR</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> LLM</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div> TTS</div>
    </div>
  `;

  for (const result of data.results) {
    const b = result.baseline;
    const p = result.predgen;
    const maxTime = Math.max(b.total_time, p.total_time);

    // Timeline segments (as percentage of max time)
    const bAsrPct = (b.asr_time / maxTime) * 100;
    const bLlmStart = bAsrPct;
    const bLlmPct = (b.llm_time / maxTime) * 100;
    const bTtsStart = bAsrPct + bLlmPct;
    const bTtsPct = (b.tts_time / maxTime) * 100;

    // PredGen: ASR and LLM overlap. We show ASR bar, then LLM starts partway through
    // For simplicity, show total time as the bar width
    const pTotalPct = (p.total_time / maxTime) * 100;
    // Estimate: ASR runs for audio_duration, LLM overlaps
    const pAudioDur = p.audio_duration || b.audio_duration || 1;
    const pAsrPct = Math.min((pAudioDur / maxTime) * 100, pTotalPct);
    // LLM starts early (during ASR) - show it starting at ~50% of ASR
    const pLlmStartPct = pAsrPct * 0.3;
    const pLlmPct = (p.llm_time / maxTime) * 100;
    const pTtsStartPct = Math.min(pLlmStartPct + pLlmPct, pTotalPct - (p.tts_time / maxTime) * 100);
    const pTtsPct = (p.tts_time / maxTime) * 100;

    html += `
      <div class="result-card">
        <h2>
          ${result.audio_file}
          <span class="badge">${result.speedup.toFixed(2)}x faster</span>
        </h2>
        <div class="pipelines">
          <div class="pipeline baseline">
            <h3>Baseline (Sequential)</h3>
            <div class="metric-row"><span class="label">ASR</span><span class="value">${fmt(b.asr_time)}</span></div>
            <div class="metric-row"><span class="label">LLM</span><span class="value">${fmt(b.llm_time)}</span></div>
            <div class="metric-row"><span class="label">LLM TTFS</span><span class="value">${fmt(b.llm_ttfs)}</span></div>
            <div class="metric-row"><span class="label">TTS</span><span class="value">${fmt(b.tts_time)}</span></div>
            <div class="metric-row" style="border-bottom:none;"><span class="label">Total</span><span class="value" style="color:#f87171;font-size:1rem;">${fmt(b.total_time)}</span></div>

            <div class="timeline">
              <div class="timeline-label">Timeline</div>
              <div class="timeline-bar-container">
                <div class="timeline-segment seg-asr" style="left:0;width:${bAsrPct}%">ASR</div>
                <div class="timeline-segment seg-llm" style="left:${bLlmStart}%;width:${bLlmPct}%">LLM</div>
                <div class="timeline-segment seg-tts" style="left:${bTtsStart}%;width:${bTtsPct}%">TTS</div>
              </div>
            </div>

            <div class="transcript-box">
              <div class="label">Transcript</div>
              ${b.transcript || '—'}
            </div>
            <div class="transcript-box">
              <div class="label">Response</div>
              ${b.gen_text || '—'}
            </div>
          </div>

          <div class="pipeline predgen">
            <h3>PredGen (Speculative)</h3>
            <div class="metric-row"><span class="label">LLM (overlapped)</span><span class="value">${fmt(p.llm_time)}</span></div>
            <div class="metric-row"><span class="label">LLM TTFS</span><span class="value">${fmt(p.llm_ttfs)}</span></div>
            <div class="metric-row"><span class="label">LLM NFE</span><span class="value">${p.llm_nfe || '—'}</span></div>
            <div class="metric-row"><span class="label">TTS</span><span class="value">${fmt(p.tts_time)}</span></div>
            <div class="metric-row" style="border-bottom:none;"><span class="label">Total</span><span class="value" style="color:#4ade80;font-size:1rem;">${fmt(p.total_time)}</span></div>

            <div class="timeline">
              <div class="timeline-label">Timeline (overlapped)</div>
              <div class="timeline-bar-container">
                <div class="timeline-segment seg-asr" style="left:0;width:${pAsrPct}%">ASR</div>
                <div class="timeline-segment seg-llm" style="left:${pLlmStartPct}%;width:${Math.min(pLlmPct, 100 - pLlmStartPct)}%;opacity:0.9">LLM</div>
                <div class="timeline-segment seg-tts" style="left:${Math.max(pTtsStartPct, 0)}%;width:${Math.min(pTtsPct, 100 - Math.max(pTtsStartPct, 0))}%">TTS</div>
              </div>
            </div>

            <div class="transcript-box">
              <div class="label">Transcript</div>
              ${p.transcript || '—'}
            </div>
            <div class="transcript-box">
              <div class="label">Response</div>
              ${p.gen_text || '—'}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  app.innerHTML = html;
}
</script>
</body>
</html>
